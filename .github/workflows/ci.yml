name: CI

# T-12 del checklist de Sprint 0 (docs/TEST_PLAN.md §6).
# Gate automático en cada PR con la suite @smoke (rápida). La suite
# @regression completa corre cuando un PR se mergea a main (evento
# pull_request "closed" con merged=true — no depende de un push directo)
# y además de forma nocturna vía schedule, como red de seguridad.
# Ambas suites publican el reporte de Allure y el HTML de Playwright como
# artefactos, con screenshots/video/trace de los tests que fallaron.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch: {}

jobs:
  smoke:
    name: Smoke tests (PR gate)
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores de Playwright
        run: npx playwright install --with-deps chromium

      - name: Generar env/.env desde secrets
        run: |
          mkdir -p env
          cat <<EOF > env/.env
          URL=${{ secrets.QA_URL }}
          EMAIL=${{ secrets.QA_TEST_EMAIL }}
          PASSWORD=${{ secrets.QA_TEST_PASSWORD }}
          EOF

      - name: Ejecutar suite @smoke (solo chromium)
        run: npx playwright test --grep @smoke --project=chromium
        env:
          CI: true

      - name: Generar reporte de Allure
        if: always()
        run: npm run report

      - name: Publicar artefactos (Allure + Playwright HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_id }}
          path: |
            allure-report/
            playwright-report/
            allure-results/
          retention-days: 14

  regression:
    name: Regression suite (main)
    if: |
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true) ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # El evento pull_request "closed" no apunta a main por defecto;
          # lo fijamos explícitamente para validar el código ya mergeado
          # (en schedule/workflow_dispatch, main también es lo correcto).
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores de Playwright
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Generar env/.env desde secrets
        run: |
          mkdir -p env
          cat <<EOF > env/.env
          URL=${{ secrets.QA_URL }}
          EMAIL=${{ secrets.QA_TEST_EMAIL }}
          PASSWORD=${{ secrets.QA_TEST_PASSWORD }}
          EOF

      - name: Ejecutar suite @regression
        run: npx playwright test --grep @regression --project=${{ matrix.project }}
        env:
          CI: true

      - name: Generar reporte de Allure
        if: always()
        run: npm run report

      - name: Publicar artefactos (Allure + Playwright HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ matrix.project }}-${{ github.run_id }}
          path: |
            allure-report/
            playwright-report/
            allure-results/
          retention-days: 30